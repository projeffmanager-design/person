
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>신라 왕실 계보도 — 21대~38대</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500;600;700;900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-0: #0a0810; --bg-1: #110e1a; --bg-2: #181423; --bg-3: #221c30;
    --bg-hover: rgba(201,168,76,0.06);
    --gold: #d4af52; --gold-light: #ecd285; --gold-soft: #b8954a; --gold-dim: #8a6f2e;
    --crimson: #c14b3d; --jade: #4ba896; --violet: #a684d6;
    --text-1: #f5ecd0; --text-2: #b8a989; --text-3: #6a5d48;
    --line: rgba(201,168,76,0.10); --line-strong: rgba(201,168,76,0.22);
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.3), 0 1px 1px rgba(0,0,0,0.2);
    --shadow-md: 0 2px 4px rgba(0,0,0,0.3), 0 8px 24px rgba(0,0,0,0.25);
    --shadow-lg: 0 4px 8px rgba(0,0,0,0.4), 0 16px 48px rgba(0,0,0,0.35);
    --glow-gold: 0 0 24px rgba(212,175,82,0.15);
    --serif: 'Noto Serif KR', 'Noto Sans KR', serif;
    --sans: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: radial-gradient(ellipse 80% 50% at 50% 0%, rgba(201,168,76,0.04), transparent 60%), var(--bg-0);
    color: var(--text-1); font-family: var(--sans); font-size: 14px; line-height: 1.6;
    min-height: 100vh; overflow-x: hidden;
    -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
  }
  header {
    background: rgba(10,8,16,0.85);
    backdrop-filter: blur(20px) saturate(140%); -webkit-backdrop-filter: blur(20px) saturate(140%);
    border-bottom: 1px solid var(--line); padding: 20px 40px;
    position: sticky; top: 0; z-index: 100;
  }
  .header-inner { max-width: 1480px; margin: 0 auto; display: flex; align-items: center; gap: 18px; }
  .emblem {
    width: 44px; height: 44px; border: 1.5px solid var(--gold); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; color: var(--gold-light);
    background: radial-gradient(circle, rgba(212,175,82,0.12), transparent 70%);
    box-shadow: var(--glow-gold); flex-shrink: 0;
  }
  .header-titles { display: flex; flex-direction: column; gap: 2px; }
  h1 { font-family: var(--serif); font-size: 20px; font-weight: 600; color: var(--gold-light); letter-spacing: 0.06em; }
  .header-subtitle { font-family: var(--serif); font-size: 12px; font-weight: 300; color: var(--text-3); letter-spacing: 0.25em; }

  .tabbar {
    max-width: 1480px; margin: 0 auto; padding: 12px 40px;
    display: flex; gap: 6px; align-items: center; border-bottom: 1px solid var(--line);
  }
  .tab-btn {
    padding: 7px 14px; border-radius: 6px; border: 1px solid transparent;
    background: transparent; color: var(--text-2); cursor: pointer;
    font-family: var(--sans); font-size: 13px; font-weight: 500;
    letter-spacing: 0.02em; transition: all 0.2s ease;
  }
  .tab-btn:hover { color: var(--text-1); background: var(--bg-hover); }
  .tab-btn.on { background: rgba(212,175,82,0.08); color: var(--gold-light); border-color: var(--line-strong); }
  .tabbar-hint { margin-left: auto; color: var(--text-3); font-size: 12px; }

  .layout {
    max-width: 1480px; margin: 0 auto; display: grid;
    grid-template-columns: 240px 1fr 440px; min-height: calc(100vh - 130px);
  }

  aside.sidebar {
    background: var(--bg-1); border-right: 1px solid var(--line);
    padding: 24px 0 40px; overflow-y: auto;
    position: sticky; top: 130px; height: calc(100vh - 130px);
  }
  .sidebar-title {
    font-family: var(--serif); font-size: 11px; letter-spacing: 0.28em;
    color: var(--text-3); padding: 0 24px 16px; margin-bottom: 4px;
    text-transform: uppercase; font-weight: 500;
  }
  .king-btn {
    width: 100%; text-align: left; background: none; border: none; cursor: pointer;
    padding: 11px 24px; display: flex; align-items: center; gap: 14px;
    transition: background-color 0.18s ease, padding-left 0.18s ease;
    border-left: 2px solid transparent; position: relative;
  }
  .king-btn:hover { background: var(--bg-hover); padding-left: 28px; }
  .king-btn.active {
    background: linear-gradient(90deg, rgba(212,175,82,0.12), transparent);
    border-left-color: var(--gold);
  }
  .king-btn.active:hover { padding-left: 24px; }
  .king-num { font-family: var(--serif); font-size: 11px; color: var(--gold-soft); min-width: 24px; font-weight: 500; letter-spacing: 0.05em; }
  .king-info { display: flex; flex-direction: column; gap: 1px; }
  .king-name { font-family: var(--serif); font-size: 14px; color: var(--text-1); font-weight: 500; letter-spacing: 0.02em; }
  .king-sub { font-size: 11px; color: var(--text-3); font-weight: 300; }
  .king-btn.active .king-name { color: var(--gold-light); font-weight: 600; }
  .king-btn.queen .king-name::after { content: '女'; font-size: 9px; color: var(--violet); margin-left: 6px; vertical-align: middle; }

  main { padding: 32px 48px 60px; overflow-y: auto; animation: fadeUp 0.4s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  .succession {
    display: flex; align-items: center; overflow-x: auto;
    padding: 8px 4px 16px; margin: 0 -4px 36px;
    scrollbar-width: thin;
    mask-image: linear-gradient(90deg, transparent 0, black 24px, black calc(100% - 24px), transparent 100%);
  }
  .succession::-webkit-scrollbar { height: 4px; }
  .succession::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 2px; }
  .succ-node {
    flex-shrink: 0; background: var(--bg-2); border: 1px solid var(--line);
    border-radius: 8px; padding: 8px 14px; text-align: center;
    cursor: pointer; transition: all 0.18s ease; min-width: 78px;
  }
  .succ-node:hover { border-color: var(--line-strong); background: var(--bg-3); transform: translateY(-1px); }
  .succ-node.current {
    border-color: var(--gold);
    background: linear-gradient(180deg, rgba(212,175,82,0.18), rgba(212,175,82,0.06));
    box-shadow: var(--glow-gold);
  }
  .succ-node .n { font-family: var(--serif); font-size: 10px; color: var(--text-3); letter-spacing: 0.05em; }
  .succ-node .nm { font-family: var(--serif); font-size: 13px; color: var(--text-2); font-weight: 600; margin-top: 2px; }
  .succ-node.current .nm { color: var(--gold-light); }
  .succ-arrow { flex-shrink: 0; color: var(--gold-dim); padding: 0 6px; font-size: 12px; user-select: none; }

  .king-header { margin-bottom: 40px; padding-bottom: 28px; border-bottom: 1px solid var(--line); }
  .king-meta-line {
    display: flex; align-items: center; gap: 12px;
    font-family: var(--serif); font-size: 12px; color: var(--gold-soft);
    letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 14px;
  }
  .king-meta-line::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, var(--line-strong), transparent); }
  .king-title-row { display: flex; align-items: baseline; gap: 18px; flex-wrap: wrap; margin-bottom: 12px; }
  .king-title { font-family: var(--serif); font-size: 38px; font-weight: 700; color: var(--gold-light); letter-spacing: 0.04em; line-height: 1.1; cursor: pointer; }
  .king-title-cn { font-family: var(--serif); font-size: 20px; color: var(--text-2); font-weight: 400; letter-spacing: 0.05em; }
  .king-badge { background: var(--crimson); color: #fff; font-family: var(--serif); font-size: 10px; padding: 4px 9px; border-radius: 3px; font-weight: 600; letter-spacing: 0.1em; align-self: center; }
  .king-badge.female { background: var(--violet); }
  .king-reign { font-family: var(--serif); font-size: 13px; color: var(--jade); letter-spacing: 0.05em; margin-top: 8px; }
  .king-reign .sep { color: var(--text-3); margin: 0 12px; }
  .king-era { font-size: 12px; color: var(--text-3); margin-top: 10px; line-height: 1.8; }
  .king-era .label { color: var(--gold-soft); font-family: var(--serif); letter-spacing: 0.08em; margin-right: 6px; }

  .note-box {
    background: linear-gradient(135deg, rgba(75,168,150,0.08), rgba(75,168,150,0.02));
    border-left: 2px solid var(--jade); border-radius: 4px;
    padding: 16px 20px; font-size: 13px; color: var(--text-2);
    line-height: 1.7; margin-bottom: 32px;
  }
  .note-box strong { color: var(--jade); font-weight: 600; margin-right: 6px; }

  .section { margin-bottom: 36px; }
  .section-label {
    font-family: var(--serif); font-size: 11px; letter-spacing: 0.24em;
    color: var(--gold-soft); text-transform: uppercase;
    margin-bottom: 14px; display: flex; align-items: center; gap: 12px; font-weight: 500;
  }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--line); }
  .section-label .count { color: var(--text-3); font-size: 10px; letter-spacing: 0.1em; }

  .relations-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 10px; }
  .relation-card {
    background: var(--bg-2); border: 1px solid var(--line);
    border-radius: 8px; padding: 14px 16px; transition: all 0.2s ease;
  }
  .relation-card:hover { border-color: var(--line-strong); background: var(--bg-3); transform: translateY(-1px); }
  .relation-role { font-family: var(--serif); font-size: 10px; color: var(--text-3); margin-bottom: 6px; letter-spacing: 0.15em; text-transform: uppercase; }
  .relation-name { font-family: var(--serif); font-size: 15px; font-weight: 600; color: var(--text-1); cursor: pointer; transition: color 0.15s ease; }
  .relation-name:hover { color: var(--gold-light); }
  .relation-cn { font-size: 11px; color: var(--text-3); margin-top: 3px; }
  .relation-extra { font-size: 11px; color: var(--jade); margin-top: 5px; }

  .consort-grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .consort-tag {
    background: var(--bg-2); border: 1px solid var(--line); border-radius: 16px;
    padding: 6px 14px; font-family: var(--serif); font-size: 13px;
    color: var(--text-1); cursor: pointer; transition: all 0.2s ease;
  }
  .consort-tag:hover { border-color: var(--gold-soft); background: var(--bg-3); color: var(--gold-light); }
  .consort-tag.main-queen {
    border-color: var(--gold);
    background: linear-gradient(180deg, rgba(212,175,82,0.14), rgba(212,175,82,0.06));
    color: var(--gold-light); font-weight: 500;
  }
  .consort-tag small { color: var(--text-3); font-size: 10px; margin-left: 4px; font-family: var(--sans); }
  .consort-tag .star { color: var(--gold); margin-left: 4px; }

  .family-tree { display: flex; flex-direction: column; gap: 8px; }
  .family-branch { background: var(--bg-2); border: 1px solid var(--line); border-radius: 8px; overflow: hidden; transition: border-color 0.2s ease; }
  .family-branch:hover { border-color: var(--line-strong); }
  .branch-header { display: flex; align-items: center; gap: 10px; padding: 13px 16px; cursor: pointer; user-select: none; transition: background 0.15s ease; }
  .branch-header:hover { background: var(--bg-hover); }
  .branch-glyph { font-family: var(--serif); color: var(--gold-soft); font-size: 11px; letter-spacing: 0.1em; background: rgba(212,175,82,0.08); padding: 2px 6px; border-radius: 3px; }
  .branch-mother { font-family: var(--serif); font-size: 14px; font-weight: 600; color: var(--text-1); cursor: pointer; }
  .branch-mother:hover { color: var(--gold-light); }
  .branch-mother .meta { font-family: var(--sans); font-size: 11px; color: var(--text-3); margin-left: 8px; font-weight: 400; }
  .branch-toggle { margin-left: auto; color: var(--gold-soft); font-size: 14px; transition: transform 0.2s ease; }
  .branch-toggle.open { transform: rotate(90deg); }
  .branch-children { padding: 4px 16px 16px; display: flex; flex-wrap: wrap; gap: 8px; border-top: 1px solid var(--line); }
  .branch-children.collapsed { display: none; }
  .child-card { background: var(--bg-1); border: 1px solid var(--line); border-radius: 6px; padding: 9px 13px; min-width: 144px; transition: all 0.18s ease; cursor: pointer; }
  .child-card:hover { background: var(--bg-3); border-color: var(--line-strong); transform: translateY(-1px); }
  .child-card.king-child { border-color: var(--gold-soft); background: linear-gradient(180deg, rgba(212,175,82,0.10), rgba(212,175,82,0.03)); }
  .child-card.king-child .child-name { color: var(--gold-light); }
  .child-name { font-family: var(--serif); font-size: 13px; font-weight: 600; color: var(--text-1); margin-bottom: 2px; }
  .child-dates { font-size: 10px; color: var(--text-3); margin-top: 3px; }
  .child-note { font-size: 10px; color: var(--jade); margin-top: 3px; font-style: italic; }

  .empty-msg { color: var(--text-3); font-size: 13px; padding: 32px; text-align: center; font-style: italic; }

  aside.network-panel {
    background: var(--bg-1); border-left: 1px solid var(--line);
    padding: 24px 24px 32px; position: sticky; top: 130px;
    height: calc(100vh - 130px); overflow-y: auto;
    display: flex; flex-direction: column; gap: 14px;
  }
  .net-header {
    display: flex; align-items: center; gap: 8px;
    font-family: var(--serif); font-size: 11px; letter-spacing: 0.24em;
    color: var(--gold-soft); text-transform: uppercase; font-weight: 500;
    padding-bottom: 10px; border-bottom: 1px solid var(--line);
  }
  .net-search {
    width: 100%; padding: 9px 12px; border-radius: 6px;
    border: 1px solid var(--line); background: var(--bg-2);
    color: var(--text-1); font-family: var(--sans); font-size: 13px;
    transition: all 0.2s ease;
  }
  .net-search:focus { outline: none; border-color: var(--gold-soft); background: var(--bg-3); box-shadow: 0 0 0 3px rgba(212,175,82,0.1); }
  .net-search::placeholder { color: var(--text-3); }
  .net-controls { display: flex; flex-wrap: wrap; gap: 6px; }
  .net-btn {
    padding: 6px 11px; border-radius: 5px; border: 1px solid var(--line);
    background: var(--bg-2); color: var(--text-2); cursor: pointer;
    font-family: var(--sans); font-size: 12px; font-weight: 500;
    transition: all 0.18s ease;
  }
  .net-btn:hover { background: var(--bg-3); border-color: var(--line-strong); color: var(--text-1); }
  .net-btn.active, .net-btn.on { background: rgba(212,175,82,0.12); border-color: var(--gold-soft); color: var(--gold-light); }

  #netcanvas {
    flex: 1 1 auto; min-height: 320px;
    border: 1px solid var(--line); border-radius: 8px;
    background: radial-gradient(ellipse at center, rgba(212,175,82,0.03), transparent 70%), var(--bg-0);
    overflow: hidden;
  }

  #net-side { background: var(--bg-2); border: 1px solid var(--line); border-radius: 8px; padding: 14px; max-height: 280px; overflow-y: auto; }
  #person-detail h3 { font-family: var(--serif); font-size: 16px; color: var(--gold-light); margin-bottom: 4px; font-weight: 600; cursor: pointer; }
  #person-detail h3 small { font-family: var(--sans); font-size: 11px; color: var(--text-3); font-weight: 400; margin-left: 6px; }
  .detail-section { padding-top: 10px; margin-top: 10px; border-top: 1px solid var(--line); }
  .detail-heading { font-family: var(--serif); font-size: 11px; color: var(--gold-soft); font-weight: 600; margin-bottom: 6px; letter-spacing: 0.12em; text-transform: uppercase; }
  .detail-item { padding: 5px 8px; color: var(--text-2); cursor: pointer; border-radius: 4px; font-size: 13px; transition: all 0.15s ease; }
  .detail-item:hover { color: var(--gold-light); background: var(--bg-hover); }
  .detail-item.active { color: var(--gold-light); background: rgba(212,175,82,0.10); }
  .detail-item small { display: block; color: var(--text-3); font-size: 11px; margin-top: 2px; }

  #net-status { font-size: 11px; color: var(--text-3); padding: 4px 2px; }

  .local-warning {
    background: linear-gradient(90deg, rgba(193,75,61,0.08), rgba(212,175,82,0.04));
    border: 1px solid rgba(193,75,61,0.25); color: var(--text-1);
    padding: 14px 20px; max-width: 1480px; margin: 16px auto;
    border-radius: 8px; display: flex; gap: 14px; align-items: center; font-size: 13px;
  }
  .local-warning code { background: rgba(0,0,0,0.4); padding: 5px 9px; border-radius: 4px; font-family: 'SF Mono', Monaco, monospace; font-size: 12px; color: var(--gold-light); }
  .local-warning .actions { margin-left: auto; display: flex; gap: 8px; }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(138,111,46,0.4); border-radius: 4px; border: 2px solid transparent; background-clip: padding-box; }
  ::-webkit-scrollbar-thumb:hover { background: var(--gold-dim); background-clip: padding-box; border: 2px solid transparent; }

  .fade-in { animation: fadeUp 0.4s ease; }

  body.network-expanded .layout { grid-template-columns: 0 0 1fr; }
  body.network-expanded aside.sidebar, body.network-expanded main { display: none; }
  body.network-expanded aside.network-panel {
    position: fixed; left: 0; top: 0; right: 0; bottom: 0;
    width: 100%; height: 100%; max-height: none;
    z-index: 1200; border: none; padding: 24px 32px;
  }
  body.network-expanded #netcanvas { height: calc(100vh - 220px) !important; }

  @media screen and (max-width: 1280px) { .layout { grid-template-columns: 220px 1fr 380px; } }
  @media screen and (max-width: 1024px) { .layout { grid-template-columns: 200px 1fr; } aside.network-panel { display: none; } }
</style>
<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="emblem">☽</div>
    <div class="header-titles">
      <h1>신라 왕실 계보도</h1>
      <div class="header-subtitle">新羅 王室 系譜圖 · 21–38代</div>
    </div>
  </div>
</header>

<div id="local-warning" class="local-warning" style="display:none;">
  <div>
    현재 페이지가 파일 시스템에서 직접 열려 있습니다. 브라우저 보안 제약으로 로컬 데이터 파일을 불러올 수 없습니다.
    네트워크 뷰를 사용하려면 아래 명령으로 로컬 서버를 실행한 뒤
    <code>http://localhost:8000/silla_genealogy.html</code>로 열어주세요.
  </div>
  <div class="actions">
    <button id="copy-server-cmd" class="net-btn">서버 커맨드 복사</button>
  </div>
</div>

<div class="tabbar">
  <button id="tab-main-btn" class="tab-btn on">본문</button>
  <button id="tab-net-btn" class="tab-btn on">네트워크</button>
  <div class="tabbar-hint">두 뷰가 한 페이지에 함께 표시됩니다</div>
</div>

<div id="tab-main">
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-title">歷代 王 · 역대 왕</div>
      <div id="sidebar-list"></div>
    </aside>

    <main>
      <div id="content"></div>
    </main>

    <aside class="network-panel" id="tab-net">
      <div class="net-header">
        <span>關係 網絡 · 관계 네트워크</span>
      </div>
      <input id="net-search" class="net-search" placeholder="검색: 이름 또는 ID (예: 김춘추 / SL-0001)">
      <div class="net-controls">
        <button class="net-btn on" id="net-show-all">전체보기</button>
        <button class="net-btn" id="net-show-focus">중심보기</button>
        <button class="net-btn" id="net-expand">확대</button>
      </div>
      <div id="netcanvas"></div>
      <div id="net-side">
        <div id="person-detail">
          <div class="empty-msg">인물을 검색하거나 노드를 클릭하세요</div>
        </div>
      </div>
      <div id="net-status"></div>
    </aside>
  </div>
</div>

<script>
const KINGS = [
  { id: 21, name: "소지마립간", cn: "炤知麻立干", hanja: "비처제毗處帝", personal: "김비처毗處", reign: "재위 479~500", life: "생몰 ?~500", female: false,

// Single entry point for "click a name" → focus on direct family
async function openAndFind(name) {
  if (!name) return;
  try {
    const netTab = document.getElementById('tab-net');
    if (netTab) netTab.style.display = '';
    const netBtn = document.getElementById('tab-net-btn');
    if (netBtn) netBtn.classList.add('on');
  } catch(e) {}
  if (window.findAndFocus) {
    try { await window.findAndFocus(name); } catch(e) { console.debug('findAndFocus error', e); }
  } else {
    try { if (window.ensureNetworkLoaded) await window.ensureNetworkLoaded(); } catch(e) {}
    try { if (window.findAndFocus) await window.findAndFocus(name); } catch(e) {}
  }
}

function toggleBranch(header) {
  const children = header.nextElementSibling;
  const toggle = header.querySelector('.branch-toggle');
  const isOpen = !children.classList.contains('collapsed');
  if (isOpen) { children.classList.add('collapsed'); toggle.classList.remove('open'); }
  else { children.classList.remove('collapsed'); toggle.classList.add('open'); }
}

<script>
// Delegated click handler: clicking plain text in the central article should try to open the network
document.addEventListener('click', (e) => {
  try {
    // ignore native controls and links
    const tag = (e.target && e.target.tagName) ? e.target.tagName.toLowerCase() : '';
    if (['input','textarea','select','button','a'].indexOf(tag) !== -1) return;
    if (e.target && e.target.isContentEditable) return;

    const sel = '.relation-name, .consort-tag, .child-card, .branch-mother, .detail-item, .child-name, .king-name, .succ-node';
    let el = e.target.closest ? e.target.closest(sel) : null;

    // If no special wrapper matched, but the click happened inside the main article content,
    // try to extract a candidate name token from the nearest text-bearing element.
    const content = document.getElementById('content');
    if (!el) {
      if (content && content.contains(e.target)) {
        let a = e.target;
        for (let i = 0; i < 6 && a && a !== content; i++) {
          if (a && a.innerText && a.innerText.trim().length > 0) { el = a; break; }
          a = a.parentElement;
        }
      }
    }
    if (!el) return;

    // derive a search string: prefer data-findName attribute, otherwise innerText
    let text = (el.dataset && el.dataset.findName) ? el.dataset.findName : (el.innerText || '').trim();
    if (!text) return;

    // If the text is long, try to extract a Hangul token or CJK token as a likely name
    if (text.length > 40) {
      const hangul = text.match(/([가-힣]{1,6})/u);
      if (hangul && hangul[1]) text = hangul[1];
      else {
        const cjk = text.match(/([\u4E00-\u9FFF]{1,6})/u);
        if (cjk && cjk[1]) text = cjk[1];
      }
    }
    text = text.split(/\n|\r/)[0].trim();
    if (!text) return;

    // Debounce slightly to avoid double invocations
    setTimeout(() => {
      try { const isContentClick = content && content.contains(e.target); openAndFind(text, isContentClick ? { directOnly: true } : undefined); } catch(err) { console.debug('openAndFind error', err); }
    }, 10);
  } catch(err) { console.debug('delegated click handler error', err); }
});
</script>

<script>
// Tab switching, network loading & rendering
(() => {
  const mainBtn = document.getElementById('tab-main-btn');
  const netBtn = document.getElementById('tab-net-btn');
  const mainTab = document.getElementById('tab-main');
  const netTab = document.getElementById('tab-net');

  mainBtn.addEventListener('click', () => {
    mainBtn.classList.toggle('on');
    const on = mainBtn.classList.contains('on');
    document.querySelector('aside.sidebar').style.display = on ? '' : 'none';
    document.querySelector('main').style.display = on ? '' : 'none';
  });
  netBtn.addEventListener('click', () => {
    const isOn = netBtn.classList.toggle('on');
    netTab.style.display = isOn ? '' : 'none';
    if (location.protocol === 'file:') {
      if (isOn) document.getElementById('local-warning').style.display = '';
      document.getElementById('net-status').innerText = '로컬 파일로 열렸습니다 — 로컬 서버로 페이지로 열어주세요.';
      return;
    }
    ensureNetworkLoaded();
  });

  document.getElementById('net-show-all').addEventListener('click', () => {
    showFullGraph();
    document.getElementById('net-status').innerText = '전체 그래프 표시';
  });

  let networkLoaded = false;
  async function ensureNetworkLoaded() {
    if (networkLoaded) return;
    networkLoaded = true;
    try { await loadNetworkData(); }
    catch (err) {
      const s = document.getElementById('net-status');
      s.innerText = '데이터 로드 실패: ' + (err && err.message ? err.message : err);
      s.style.color = '#c14b3d';
    }
  }
  window.ensureNetworkLoaded = ensureNetworkLoaded;

  document.addEventListener('DOMContentLoaded', () => {
    if (location.protocol === 'file:') {
      document.getElementById('local-warning').style.display = '';
      document.getElementById('net-status').innerText = '로컬 파일로 열렸습니다 — 로컬 서버로 페이지로 열어주세요.';
      return;
    }
    try { document.getElementById('tab-net').style.display = ''; } catch (e) {}
    ensureNetworkLoaded();
  });

  function parseTSV(text) {
    const lines = text.split(/\r?\n/).map(l => l.trim()).filter(l => l.length > 0);
    return lines.map(l => l.split('\t'));
  }
  function extractHangul(s) { if (!s) return ''; const m = String(s).match(/[가-힣]+/g); return m ? m.join('') : ''; }

  // Build multiple search-key candidates for one display name
  // e.g. "법민法敏(문무왕)" → ["법민法敏(문무왕)", "문무왕", "법민法敏", "법민", "문무왕", "법민문무왕"]
  function buildSearchCandidates(name) {
    if (!name) return [];
    const out = new Set();
    const raw = String(name).trim();
    out.add(raw);
    // parenthesized portion (often the regnal name)
    const parenMatch = raw.match(/[(（]([^)）]+)[)）]/);
    if (parenMatch && parenMatch[1]) {
      out.add(parenMatch[1].trim());
      const paren = parenMatch[1].trim();
      const parenHangul = extractHangul(paren);
      if (parenHangul) out.add(parenHangul);
    }
    // before parenthesis
    const beforeParen = raw.split(/[(（]/)[0].trim();
    if (beforeParen && beforeParen !== raw) {
      out.add(beforeParen);
      const bpH = extractHangul(beforeParen);
      if (bpH) out.add(bpH);
    }
    // each contiguous Hangul block separately (key fix for "법민法敏(문무왕)" type)
    const hangulBlocks = raw.match(/[가-힣]+/g) || [];
    hangulBlocks.forEach(b => out.add(b));
    // joined Hangul (legacy behavior)
    if (hangulBlocks.length > 1) out.add(hangulBlocks.join(''));
    // strip honorific suffixes from single Hangul tokens
    const honorificSuffixes = /(왕후|왕|대왕|대제|마립간|이사금|갈문왕|태자|공주|부인|여왕|진왕|제)$/;
    hangulBlocks.forEach(b => {
      const stripped = b.replace(honorificSuffixes, '');
      if (stripped && stripped !== b && stripped.length >= 1) out.add(stripped);
    });
    return Array.from(out).filter(x => x && x.length > 0).sort((a,b) => b.length - a.length);
  }

  async function loadNetworkData() {
    const status = document.getElementById('net-status');
    status.innerText = '데이터 로딩 중...';

    const paths = ['./인물', './배우자', './부모'];
    const [pText, sText, pcText] = await Promise.all(paths.map(p => fetch(p).then(r => {
      if (!r.ok) throw new Error(`HTTP ${r.status} ${r.statusText} (${p})`);
      return r.text();
    })));

    const pRows = parseTSV(pText);
    const sRows = parseTSV(sText);
    const pcRows = parseTSV(pcText);

    const persons = new Map();
    for (let i = 1; i < pRows.length; i++) {
      const r = pRows[i];
      const id = (r[0] || '').trim();
      if (!id) continue;
      persons.set(id, { id, name: (r[1] || '').trim(), gender: (r[2] || '').trim(), life: `${r[3] || ''} ${r[4] || ''}`.trim(), note: (r[5] || '').trim() });
    }

    try {
      if (persons.has('SL-0173') && typeof KINGS !== 'undefined') {
        const k = KINGS.find(x => (x.name && x.name.indexOf('지증') !== -1) || (x.personal && x.personal.indexOf('지대로') !== -1));
        if (k) { const p = persons.get('SL-0173'); p._kingOverride = k; persons.set('SL-0173', p); }
      }
    } catch (e) {}

    const spouses = [];
    for (let i = 1; i < sRows.length; i++) {
      const r = sRows[i];
      const a = (r[1] || '').trim(); const b = (r[3] || '').trim();
      if (a && b) spouses.push([a, b]);
    }

    const pcs = [];
    const header = pcRows[0] || [];
    const headerLine = header.map(h => String(h || '').toLowerCase()).join('|');
    const isConsolidated = headerLine.indexOf('자식_id') !== -1 && (headerLine.indexOf('부_id') !== -1 || headerLine.indexOf('모_id') !== -1);
    for (let i = 1; i < pcRows.length; i++) {
      const r = pcRows[i]; if (!r || r.length === 0) continue;
      if (isConsolidated) {
        const child = (r[1] || '').trim(); const father = (r[3] || '').trim(); const mother = (r[5] || '').trim();
        if (father && child) pcs.push([father, child]);
        if (mother && child) pcs.push([mother, child]);
      } else {
        const parent = (r[1] || '').trim(); const child = (r[4] || '').trim();
        if (parent && child) pcs.push([parent, child]);
      }
    }

    const nodes = [];
    function isFemale(g) {
      if (!g) return false;
      const gg = String(g).toLowerCase();
      return gg.indexOf('女') !== -1 || gg.indexOf('여') !== -1 || gg.indexOf('f') === 0 || gg.indexOf('female') !== -1;
    }
    function kingForPerson(p) {
      if (typeof KINGS === 'undefined' || !p) return null;
      if (p && p._kingOverride) return p._kingOverride;
      const pname = extractHangul(p.name || '');
      for (const k of KINGS) {
        const kpersonal = extractHangul(k.personal || ''); const kname = extractHangul(k.name || '');
        if (kpersonal && pname && (kpersonal.indexOf(pname) !== -1 || pname.indexOf(kpersonal) !== -1)) return k;
        if (kname && pname && (kname.indexOf(pname) !== -1 || pname.indexOf(kname) !== -1)) return k;
      }
      return null;
    }

    const crownSvg = `<svg xmlns='http://www.w3.org/2000/svg' width='64' height='64' viewBox='0 0 64 64'><defs><linearGradient id='g' x1='0' x2='1'><stop offset='0' stop-color='#f5e7c6'/><stop offset='1' stop-color='#d4af52'/></linearGradient></defs><path d='M6 46 L14 20 L26 34 L38 12 L50 34 L58 20 L62 46 Z' fill='url(#g)' stroke='#b8954a' stroke-width='2'/></svg>`;
    const crownDataUri = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(crownSvg);

    for (const [id, p] of persons.entries()) {
      const female = isFemale(p.gender);
      const color = female ? '#a684d6' : '#d4af52';
      const shape = female ? 'triangle' : 'dot';
      const k = kingForPerson(p);
      let displayLabel = p.name || id;
      const nodeOpts = { id, label: displayLabel, title: `${p.name || displayLabel}\n${p.life || ''}`, color: { background: color, border: '#222' }, shape, font: { color: '#f5ecd0', face: 'Noto Sans KR' } };
      if (k) {
        nodeOpts.label = k.name || displayLabel;
        nodeOpts.color = { background: '#ecd285', border: '#f5e7c6' };
        nodeOpts.font = { color: '#ffffff', size: 14, face: 'Noto Serif KR', vadjust: -2 };
        nodeOpts.shape = 'image'; nodeOpts.image = crownDataUri;
        nodeOpts.size = 36; nodeOpts.king = true;
      }
      nodes.push(nodeOpts);
    }
    window._sillaPersons = persons;

    const edges = [];
    const pcSet = new Set();
    pcs.forEach(([parent, child]) => { if (parent && child) pcSet.add(parent + '->' + child); });

    spouses.forEach(([a,b]) => {
      if (!persons.has(a) || !persons.has(b)) return;
      let overlapCount = 0;
      if (pcSet.has(a + '->' + b)) overlapCount++;
      if (pcSet.has(b + '->' + a)) overlapCount++;
      const edge = { from: a, to: b, dashes: true, arrows: '', color: { color: '#8a6f2e' }, width: 1 };
      if (overlapCount > 0) {
        const dir = a < b ? 'curvedCW' : 'curvedCCW';
        edge.smooth = { type: dir, roundness: Math.min(0.5, 0.18 + 0.06 * (overlapCount - 1)) };
      } else {
        edge.smooth = { enabled: true, type: 'dynamic', roundness: 0.12 };
      }
      edges.push(edge);
    });

    pcs.forEach(([parent, child]) => {
      if (!persons.has(parent) || !persons.has(child)) return;
      edges.push({ from: parent, to: child, arrows: 'to', color: { color: '#4ba896' }, width: 1.2, smooth: { enabled: true, type: 'dynamic', roundness: 0.10 } });
    });

    for (let i = 0; i < edges.length; i++) {
      const e = edges[i];
      if (!e.dashes) continue;
      const hasPC = edges.some(x => (x.arrows && String(x.arrows).indexOf('to') !== -1) && ((x.from === e.from && x.to === e.to) || (x.from === e.to && x.to === e.from)));
      if (hasPC) {
        const a = e.from, b = e.to;
        const dir = a < b ? 'curvedCW' : 'curvedCCW';
        e.smooth = { type: dir, roundness: 0.26 };
      }
    }

    // Pre-position king nodes in a horizontal row above the graph
    try {
      const kingNodes = nodes.filter(n => n.king);
      let orderedKingNodes = [];
      if (typeof KINGS !== 'undefined' && Array.isArray(KINGS) && KINGS.length > 0) {
        for (let i = 0; i < KINGS.length; i++) {
          const kname = KINGS[i] && (KINGS[i].name || KINGS[i].personal || '');
          const kn = extractHangul(kname || '');
          if (!kn) continue;
          const found = kingNodes.find(n => extractHangul(n.label || '').indexOf(kn) !== -1 || extractHangul((window._sillaPersons && (window._sillaPersons.get(n.id)||{}).name) || '').indexOf(kn) !== -1);
          if (found && !orderedKingNodes.find(x => x.id === found.id)) orderedKingNodes.push(found);
        }
        kingNodes.forEach(n => { if (!orderedKingNodes.find(x => x.id === n.id)) orderedKingNodes.push(n); });
      } else { orderedKingNodes = kingNodes.slice(); }

      if (orderedKingNodes.length > 0) {
        const spacing = 300;
        const startX = -((orderedKingNodes.length - 1) * spacing) / 2;
        const y = -220;
        for (let i = 0; i < orderedKingNodes.length; i++) {
          const knode = orderedKingNodes[i];
          const x = startX + i * spacing;
          const idx = nodes.findIndex(n => n.id === knode.id);
          if (idx !== -1) {
            nodes[idx].x = x; nodes[idx].y = y;
            nodes[idx].fixed = { x: true, y: true }; nodes[idx].physics = false;
            nodes[idx].size = Math.max(nodes[idx].size || 24, 36);
            nodes[idx].font = Object.assign({}, nodes[idx].font || {}, { color: '#ffffff', size: 14, face: 'Noto Serif KR' });
          }
        }
      }
    } catch (e) {}

    renderNetwork(nodes, edges);
    status.innerText = `노드 ${nodes.length}개 · 관계 ${edges.length}개`;
    status.style.color = '#b8a989';
  }

  function renderNetwork(nodes, edges) {
    const container = document.getElementById('netcanvas');
    container.innerHTML = '';
    const dsNodes = new vis.DataSet(nodes);
    const dsEdges = new vis.DataSet(edges);
    window._sillaNodes = dsNodes; window._sillaEdges = dsEdges;
    window._sillaOrig = { nodes: nodes.slice(), edges: edges.slice() };
    if (!window._sillaPersons) window._sillaPersons = new Map();

    // Build label/name → id lookup with multiple variants for fuzzy matching
    window._sillaLabelToId = {};
    function addKeyVariants(key, id) {
      if (!key || !id) return;
      try {
        window._sillaLabelToId[key] = id;
        const hn = extractHangul(key);
        if (hn) window._sillaLabelToId[hn] = id;
        const stripped = String(key).replace(/[\s\p{P}\p{S}]+/gu, '');
        if (stripped && stripped !== key) window._sillaLabelToId[stripped] = id;
      } catch (e) {}
    }
    window._sillaOrig.nodes.forEach(n => { if (n.label) addKeyVariants(n.label, n.id); });
    if (window._sillaPersons) window._sillaPersons.forEach(p => {
      if (p.name) addKeyVariants(p.name, p.id);
    });
    if (typeof KINGS !== 'undefined') {
      KINGS.forEach(k => {
        const kn = extractHangul(k.name || '') || (k.name || ''); if (!kn) return;
        const found = window._sillaOrig.nodes.find(n => extractHangul(n.label || '').indexOf(kn) !== -1 || (window._sillaPersons && extractHangul((window._sillaPersons.get(n.id)||{}).name||'').indexOf(kn)!==-1));
        if (found) addKeyVariants(kn, found.id);
      });
    }

    const data = { nodes: dsNodes, edges: dsEdges };
    const options = {
      autoResize: true, height: '100%',
      // CRITICAL: disable hover-driven highlighting that was causing perceived
      // movement on mouse-over. Keep wheel-zoom and drag-pan for deliberate user input.
      interaction: {
        hover: false,
        hoverConnectedEdges: false,
        selectConnectedEdges: false,
        multiselect: false,
        zoomView: true,
        dragView: true,
        tooltipDelay: 300,
      },
      nodes: { shape: 'dot', size: 12, font: { color: '#f5ecd0', face: 'Noto Sans KR' } },
      edges: { smooth: { enabled: true, type: 'dynamic', roundness: 0.18 }, color: { color: 'rgba(184,148,74,0.22)' }, width: 1.1 },
      // Run a bounded one-time stabilization. After we filter to a focused view
      // we will disable physics entirely so the graph never drifts.
      physics: {
        enabled: true,
        stabilization: { enabled: true, iterations: 200, fit: true },
        barnesHut: { gravitationalConstant: -18000, springLength: 140, damping: 0.5 },
      },
    };
    const network = new vis.Network(container, data, options);
    window._sillaNetwork = network;

    // After stabilization, freeze physics so nothing drifts during reading.
    network.once('stabilizationIterationsDone', () => {
      try { network.setOptions({ physics: { enabled: false } }); } catch(e) {}
    });

    // Click on a node → focus on its direct family (centered)
    network.on('click', params => {
      if (!params.nodes || !params.nodes.length) return;
      const id = params.nodes[0];
      window._lastFocusedId = id;
      focusOnPerson(id);
      renderPersonDetail(id);
      const n = window._sillaOrig.nodes.find(x => x.id === id);
      const status = document.getElementById('net-status');
      if (status) status.innerText = n ? `🎯 ${n.label} (${n.id}) — 직계 표시` : '';
    });

    // Allow the user to pick up and move nodes: unfix on dragStart, refix on dragEnd
    network.on('dragStart', params => {
      try {
        if (!params || !params.nodes || !params.nodes.length) return;
        const updated = [];
        params.nodes.forEach(id => {
          const n = dsNodes.get(id); if (!n) return;
          // allow the node to be moved by the user
          n.fixed = false; n.physics = true; updated.push(n);
        });
        if (updated.length) dsNodes.update(updated);
      } catch(e) {}
    });

    network.on('dragEnd', params => {
      try {
        if (!params || !params.nodes || !params.nodes.length) return;
        const updated = [];
        params.nodes.forEach(id => {
          const n = dsNodes.get(id); if (!n) return;
          // fix the node at its new position
          n.fixed = { x: true, y: true }; n.physics = false; updated.push(n);
          // persist the x/y into the original nodes so future showFullGraph()/render
          // operations will restore the node to this position.
          try {
            if (window._sillaOrig && Array.isArray(window._sillaOrig.nodes)) {
              const orig = window._sillaOrig.nodes.find(o => o.id === id);
              if (orig) { orig.x = n.x; orig.y = n.y; orig.fixed = { x: true, y: true }; orig.physics = false; }
            }
          } catch(e) {}
        });
        if (updated.length) dsNodes.update(updated);
      } catch(e) {}
    });

    // Wire toolbar buttons
    const btnFocus = document.getElementById('net-show-focus');
    const btnExpand = document.getElementById('net-expand');

    if (btnFocus) btnFocus.addEventListener('click', () => {
      const current = currentKing && currentKing.name; if (!current) return;
      openAndFind(current);
    });

    if (btnExpand) btnExpand.addEventListener('click', () => {
      const expanded = document.body.classList.toggle('network-expanded');
      btnExpand.classList.toggle('on', expanded);
      btnExpand.innerText = expanded ? '축소' : '확대';
      setTimeout(() => {
        try {
          if (window._sillaNetwork) {
            window._sillaNetwork.redraw();
            if (window._lastFocusedId) {
              // re-center on the currently focused person at (0,0)
              window._sillaNetwork.moveTo({ position: { x: 0, y: 0 }, scale: 1.4, animation: { duration: 300 } });
            } else {
              window._sillaNetwork.fit({ animation: { duration: 300 } });
            }
          }
        } catch (e) {}
      }, 220);
    });

    // Search input
    const search = document.getElementById('net-search');
    if (search) {
      search.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          const q = search.value.trim(); if (!q) return;
          openAndFind(q);
        }
      });
    }
  }

  // Show the entire graph (used by "전체보기" button)
  function showFullGraph() {
    if (!window._sillaOrig || !window._sillaNodes || !window._sillaEdges) return;
    window._sillaNodes.clear(); window._sillaEdges.clear();
    window._sillaNodes.add(window._sillaOrig.nodes);
    window._sillaEdges.add(window._sillaOrig.edges);
    window._lastFocusedId = null;
    if (window._sillaNetwork) {
      try {
        window._sillaNetwork.setOptions({ physics: { enabled: false } });
        window._sillaNetwork.fit({ animation: { duration: 400 } });
      } catch(e) {}
    }
  }

  // Filter to direct family of `personId` and place focused node at (0,0).
  // This guarantees the target is always at the visual center and nothing drifts.
  function focusOnPerson(personId) {
    if (!personId || !window._sillaNodes || !window._sillaEdges || !window._sillaOrig) return;
    const allNodes = window._sillaOrig.nodes;
    const allEdges = window._sillaOrig.edges;

    // collect direct neighbors (parents, spouses, children) — 1 hop only
    const neighborIds = new Set([personId]);
    allEdges.forEach(e => {
      if (e && ((e.width === 0) || (e.color && e.color.opacity === 0) || e.meta === 'king_spacing')) return;
      if (e.from === personId) neighborIds.add(e.to);
      if (e.to === personId) neighborIds.add(e.from);
    });

    // categorize neighbors so we can lay them out around the focus in semantic positions
    const parents = []; const spouses = []; const children = [];
    allEdges.forEach(e => {
      if (e && ((e.width === 0) || (e.color && e.color.opacity === 0) || e.meta === 'king_spacing')) return;
      const isPC = e.arrows && String(e.arrows).indexOf('to') !== -1;
      const isSpouse = !!e.dashes;
      if (isPC && e.to === personId && !parents.includes(e.from)) parents.push(e.from);
      if (isPC && e.from === personId && !children.includes(e.to)) children.push(e.to);
      if (isSpouse) {
        if (e.from === personId && !spouses.includes(e.to)) spouses.push(e.to);
        if (e.to === personId && !spouses.includes(e.from)) spouses.push(e.from);
      }
    });

    // Build positioned visible nodes
    const visibleNodes = [];
    const placed = new Set();

    // Center: focused person at origin
    const focusedOriginal = allNodes.find(n => n.id === personId);
    if (focusedOriginal) {
      const c = Object.assign({}, focusedOriginal, {
        x: 0, y: 0,
        fixed: { x: true, y: true },
        physics: false,
      });
      visibleNodes.push(c);
      placed.add(personId);
    }

    // Parents above (negative y)
    const parentY = -160;
    const parentSpacing = Math.max(140, parents.length > 1 ? 220 : 0);
    parents.forEach((pid, i) => {
      if (placed.has(pid)) return;
      const orig = allNodes.find(n => n.id === pid); if (!orig) return;
      const offset = (i - (parents.length - 1) / 2) * parentSpacing;
      visibleNodes.push(Object.assign({}, orig, { x: offset, y: parentY, fixed: {x:true,y:true}, physics: false }));
      placed.add(pid);
    });

    // Spouses to the sides at y=0
    const spouseSpacing = 200;
    spouses.forEach((sid, i) => {
      if (placed.has(sid)) return;
      const orig = allNodes.find(n => n.id === sid); if (!orig) return;
      // alternate left/right
      const side = (i % 2 === 0) ? -1 : 1;
      const layer = Math.floor(i / 2) + 1;
      visibleNodes.push(Object.assign({}, orig, { x: side * spouseSpacing * layer, y: 0, fixed: {x:true,y:true}, physics: false }));
      placed.add(sid);
    });

    // Children below (positive y), arranged in a horizontal row
    const childY = 200;
    const childSpacing = Math.max(110, children.length > 6 ? 90 : 130);
    children.forEach((cid, i) => {
      if (placed.has(cid)) return;
      const orig = allNodes.find(n => n.id === cid); if (!orig) return;
      const offset = (i - (children.length - 1) / 2) * childSpacing;
      visibleNodes.push(Object.assign({}, orig, { x: offset, y: childY, fixed: {x:true,y:true}, physics: false }));
      placed.add(cid);
    });

    // Any remaining neighbors (shouldn't usually happen): place on outer ring
    const others = Array.from(neighborIds).filter(id => !placed.has(id));
    others.forEach((oid, i) => {
      const orig = allNodes.find(n => n.id === oid); if (!orig) return;
      const angle = (i / Math.max(1, others.length)) * Math.PI * 2;
      visibleNodes.push(Object.assign({}, orig, { x: Math.cos(angle) * 320, y: Math.sin(angle) * 320, fixed: {x:true,y:true}, physics: false }));
    });

    // Edges between visible nodes only
    const visibleIdSet = new Set(visibleNodes.map(n => n.id));
    const visibleEdges = allEdges.filter(e => {
      if (e && ((e.width === 0) || (e.color && e.color.opacity === 0) || e.meta === 'king_spacing')) return false;
      return visibleIdSet.has(e.from) && visibleIdSet.has(e.to);
    }).map(e => Object.assign({}, e));

    // Apply to datasets
    window._sillaNodes.clear(); window._sillaEdges.clear();
    window._sillaNodes.add(visibleNodes); window._sillaEdges.add(visibleEdges);

    // Disable physics for the focused view and center the viewport on (0,0)
    if (window._sillaNetwork) {
      try {
        window._sillaNetwork.setOptions({ physics: { enabled: false } });
        // Wait one frame for vis to apply the new dataset, then center deterministically
        setTimeout(() => {
          try {
            window._sillaNetwork.moveTo({
              position: { x: 0, y: 0 },
              scale: 1.4,
              animation: { duration: 450, easingFunction: 'easeInOutCubic' }
            });
          } catch(e) {}
        }, 30);
      } catch(e) {}
    }
  }

  function renderPersonDetail(personId) {
    const container = document.getElementById('person-detail');
    container.innerHTML = '';
    if (!personId) {
      container.innerHTML = '<div class="empty-msg">인물을 검색하거나 노드를 클릭하세요</div>';
      return;
    }
    const persons = window._sillaPersons || new Map();
    const node = (window._sillaNodes && window._sillaNodes.get(personId)) || null;
    const p = persons.get(personId) || { name: node ? node.label : personId };

    // Header — clicking re-centers on this person
    const h = document.createElement('div');
    const genderText = (p.gender && (String(p.gender).indexOf('女') !== -1 || String(p.gender).indexOf('여') !== -1)) ? '女' : ((p.gender && p.gender.length) ? '男' : '');
    h.innerHTML = `<h3 onclick="openAndFind(${JSON.stringify(p.name || personId)})">${p.name || personId} ${genderText ? '<small>' + genderText + ' · ' + personId + '</small>' : '<small>' + personId + '</small>'}</h3>`;
    container.appendChild(h);

    // Life
    const life = document.createElement('div');
    life.className = 'detail-section';
    let birth = '', death = '';
    if (p.life) { const m = String(p.life).match(/(\d{3,4})\s*[\-~]\s*(\d{3,4}|\?)/); if (m) { birth = m[1]; death = m[2]; } }
    life.innerHTML = `<div class="detail-heading">생/몰</div><div style="color:var(--text-2);font-size:13px;">${birth || ''} ${death ? ' / ' + death : (p.life || '정보 없음')}</div>`;
    container.appendChild(life);

    const origEdges = window._sillaOrig ? window._sillaOrig.edges : window._sillaEdges.get();

    // Helper to make a clickable detail item that re-centers on the clicked person
    function makeItem(id, displayName) {
      const el = document.createElement('div');
      el.className = 'detail-item';
      if (id === window._lastFocusedId) el.classList.add('active');
      el.innerText = displayName;
      el.onclick = (ev) => {
        ev.stopPropagation();
        // Always go through openAndFind so behavior is consistent regardless of
        // how many times the user clicks the same or different items.
        openAndFind(displayName);
      };
      return el;
    }

    // Parents
    const parDiv = document.createElement('div'); parDiv.className = 'detail-section';
    parDiv.innerHTML = `<div class="detail-heading">부모</div>`;
    const parList = document.createElement('div');
    const parentIds = [];
    origEdges.forEach(e => { if (e.arrows && e.arrows.indexOf('to') !== -1 && e.to === personId) parentIds.push(e.from); });
    if (parentIds.length === 0) parList.innerHTML = '<div style="color:var(--text-3);font-size:12px;padding:4px 0;">정보 없음</div>';
    else parentIds.forEach(id => {
      const pp = persons.get(id) || { name: id };
      parList.appendChild(makeItem(id, pp.name || id));
    });
    parDiv.appendChild(parList); container.appendChild(parDiv);

    // Spouses
    const spDiv = document.createElement('div'); spDiv.className = 'detail-section';
    spDiv.innerHTML = `<div class="detail-heading">배우자</div>`;
    const spList = document.createElement('div');
    const spouseIds = new Set();
    origEdges.forEach(e => { if (e.dashes) { if (e.from === personId) spouseIds.add(e.to); if (e.to === personId) spouseIds.add(e.from); } });
    if (spouseIds.size === 0) spList.innerHTML = '<div style="color:var(--text-3);font-size:12px;padding:4px 0;">없음</div>';
    else spouseIds.forEach(id => {
      const pp = persons.get(id) || { name: id };
      spList.appendChild(makeItem(id, pp.name || id));
    });
    spDiv.appendChild(spList); container.appendChild(spDiv);

    // Children
    const chDiv = document.createElement('div'); chDiv.className = 'detail-section';
    chDiv.innerHTML = `<div class="detail-heading">자식</div>`;
    const chList = document.createElement('div');
    const childIds = [];
    origEdges.forEach(e => { if (e.arrows && e.arrows.indexOf('to') !== -1 && e.from === personId) childIds.push(e.to); });
    if (childIds.length === 0) chList.innerHTML = '<div style="color:var(--text-3);font-size:12px;padding:4px 0;">없음</div>';
    else childIds.forEach(id => {
      const pp = persons.get(id) || { name: id };
      chList.appendChild(makeItem(id, pp.name || id));
    });
    chDiv.appendChild(chList); container.appendChild(chDiv);
  }

  // Robust find: tries multiple Hangul/string variants of the input name
  async function findAndFocus(name) {
    if (!name) return;
    try { await ensureNetworkLoaded(); } catch (e) {}

    const q = String(name).trim();
    const candidates = buildSearchCandidates(q);
    const tried = [];
    let id = null;
    let matchedVia = '';

    // Step 1: exact map lookup
    if (window._sillaLabelToId) {
      for (const c of candidates) {
        if (window._sillaLabelToId[c]) { id = window._sillaLabelToId[c]; matchedVia = `map:${c}`; break; }
        const ch = extractHangul(c);
        if (ch && window._sillaLabelToId[ch]) { id = window._sillaLabelToId[ch]; matchedVia = `map-h:${ch}`; break; }
      }
    }
    tried.push('map');

    // Step 2: scan node labels
    if (!id) {
      const nodesList = window._sillaOrig ? window._sillaOrig.nodes : (window._sillaNodes ? window._sillaNodes.get() : []);
      for (const c of candidates) {
        const found = nodesList.find(n => n.label && (n.label === c || n.label.indexOf(c) !== -1));
        if (found) { id = found.id; matchedVia = `node:${c}`; break; }
        const ch = extractHangul(c);
        if (ch) {
          const found2 = nodesList.find(n => n.label && extractHangul(n.label).indexOf(ch) !== -1);
          if (found2) { id = found2.id; matchedVia = `node-h:${ch}`; break; }
        }
      }
      tried.push('node');
    }

    // Step 3: scan persons map
    if (!id && window._sillaPersons) {
      for (const c of candidates) {
        for (const [pid, p] of window._sillaPersons.entries()) {
          if (!p) continue;
          if ((p.name && (p.name === c || p.name.indexOf(c) !== -1)) ||
              (p.note && p.note.indexOf(c) !== -1)) {
            id = pid; matchedVia = `person:${c}`; break;
          }
        }
        if (id) break;
      }
      tried.push('person');
    }

    const statusEl = document.getElementById('net-status');
    if (id) {
      console.debug(`[findAndFocus] "${q}" → ${id} via ${matchedVia}`);
      window._lastFocusedId = id;
      try {
        const netTab = document.getElementById('tab-net');
        if (netTab) netTab.style.display = '';
        const netBtn = document.getElementById('tab-net-btn');
        if (netBtn) netBtn.classList.add('on');
      } catch(e) {}
      focusOnPerson(id);
      renderPersonDetail(id);
      if (statusEl) {
        const node = window._sillaOrig.nodes.find(n => n.id === id);
        statusEl.innerText = `🎯 ${node ? node.label : q} (${id}) — 직계 표시`;
        statusEl.style.color = '#ecd285';
      }
    } else {
      console.warn(`[findAndFocus] no match for "${q}"  Tried: ${candidates.join(', ')}`);
      if (statusEl) {
        statusEl.innerText = `❌ '${q}' 매칭 실패. 시도: ${candidates.slice(0,5).join(', ')}`;
        statusEl.style.color = '#c14b3d';
      }
    }
  }

  window._sillaHelpers = { focusOnPerson, showFullGraph, renderPersonDetail, findAndFocus };
  window.findAndFocus = findAndFocus;
  window.showFullGraph = showFullGraph;
})();
</script>

<script>
(() => {
  const warn = document.getElementById('local-warning');
  if (!warn) return;
  if (location.protocol === 'file:') warn.style.display = '';
  document.getElementById('copy-server-cmd').addEventListener('click', async () => {
    const cmd = "python3 -m http.server 8000";
    try {
      await navigator.clipboard.writeText(cmd);
      document.getElementById('copy-server-cmd').innerText = '복사됨';
      setTimeout(() => document.getElementById('copy-server-cmd').innerText = '서버 커맨드 복사', 2000);
    } catch (e) { alert('클립보드에 복사할 수 없습니다. 명령을 수동으로 복사하세요:\n' + cmd); }
  });
})();
</script>
